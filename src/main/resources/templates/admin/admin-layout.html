<!-- src/main/resources/templates/layout/admin-layout.html -->
<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">운영자 페이지</title>
    <!-- 스타일시트 -->
    <link href="/admin/css/admin.css" rel="stylesheet">
    <link href="/admin/css/header.css" rel="stylesheet">
    <link href="/layout/member/css/footer.css" rel="stylesheet">
    <link href="/admin/css/sidebar.css" rel="stylesheet">
    <link href="/admin/css/example.css" rel="stylesheet">
    <link rel="shortcut icon" href="/favicon-3.ico" type="image/x-icon"/>
    <!-- Font Awesome (아이콘) -->
    <link crossorigin="anonymous" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
          integrity="sha512-Fo3rlrQkz..." referrerpolicy="no-referrer" rel="stylesheet"/>
</head>

<body>
<!-- 상단 헤더 -->
<header class="header" th:insert="~{layout/admin/adminheader :: adminheaderContent}"></header>

<!-- 메인 레이아웃 -->
<div class="main-container">
    <!-- 왼쪽 사이드바 -->
    <aside aria-label="사이드바 메뉴" class="sidebar" th:insert="~{layout/admin/adminsidebar :: adminsidebarContent}"></aside>

    <!-- 오른쪽 메인 콘텐츠 영역 -->
    <main class="main-content" th:replace="${content}">
        <!-- 기본 콘텐츠 (각 페이지에서 덮어쓰기) -->
        <h1>메인 콘텐츠</h1>
    </main>
</div>

<!-- 푸터 -->
<footer class="footer" th:insert="~{layout/member/footer :: footerContent}"></footer>

<!-- JS: 햄버거 메뉴 및 다크모드 토글 등 -->
<script src="/admin/js/admin.js"></script>
</body>
</html>
