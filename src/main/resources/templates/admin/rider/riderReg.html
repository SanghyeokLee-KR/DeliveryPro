<div class="rider-admin-container" th:fragment="riderReg-editContent">
  <!-- 헤더 섹션: 제목과 검색 바 -->
  <div class="rider-admin-header">
    <h2 class="rider-admin-title">라이더 관리</h2>
    <div class="rider-admin-search">
      <form class="rider-admin-search-form" method="get" th:action="@{/admin/rider/riderReg}">
        <input name="searchQuery" placeholder="가게 이름 또는 카테고리 검색" th:value="${searchQuery}" type="text">

        <select class="rider-admin-filter-select" name="status">
          <option value="">모든 상태</option>
          <option th:selected="${isAvailable == '승인'}" value="차단">승인</option>
          <option th:selected="${isAvailable == '차단'}" value="폐점">차단</option>
          <option th:selected="${isAvailable == '보류'}" value="보류">보류</option>
        </select>

        <button class="rider-admin-search-button" type="submit">검색</button>
      </form>
    </div>
  </div>

  <!-- 가게 리스트 테이블 -->
  <table class="rider-admin-table">
    <thead>
    <tr>
      <th>라이더 번호</th>
      <th>라이더 ID</th>
      <th>라이더 이름</th>
      <th>차량종류</th>
      <th>전화번호</th>
      <th>상태</th>
      <th>배달횟수</th>
      <th>등록일</th>
      <th>승인</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="rider : ${riderList}">
      <td th:text="${rider.riderNo}">1</td>
      <td th:text="${rider.riderId}">라이더 아이디</td>
      <td th:text="${rider.riderName}">라이더 이름</td>
      <td th:text="${rider.vehicleType}">차량종류</td>
      <td th:text="${rider.riderPhone}">전화번호</td>
      <td>
        <span class="rider-admin-data-status" th:text="${rider.isAvailable}">상태</span>
      </td>
      <td th:text="${rider.totalDeliveries} + 건">4</td>
      <td th:text="${#temporals.format(rider.riderCreatedAt, 'yyyy-MM-dd HH:mm')}">2023-10-01 12:34</td>
      <td>
        <a class="rider-admin-edit-button" th:href="@{/rider-status-url/{id}(id=${rider.riderNo})}">승인</a>
      </td>
    </tr>
    </tbody>
  </table>

  <!-- 페이징 네비게이션 -->
  <div class="rider-admin-pagination">
    <!-- 이전 페이지 링크 -->
    <a class="pagination-item"
       th:href="@{/admin/rider/riderReg(page=${currentPage - 1}, size=${riderPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
       th:if="${riderPage.hasPrevious()}">
      이전
    </a>

    <!-- 페이지 번호 링크 또는 현재 페이지 표시 -->
    <span th:each="i : ${#numbers.sequence(0, riderPage.totalPages - 1)}">
            <a class="pagination-item"
               th:href="@{/admin/rider/riderReg(page=${i}, size=${riderPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
               th:if="${i != currentPage}"
               th:text="${i + 1}">
            </a>
            <span aria-current="page"
                  class="pagination-current"
                  th:if="${i == currentPage}"
                  th:text="${i + 1}">
            </span>
        </span>

    <!-- 다음 페이지 링크 -->
    <a class="pagination-item"
       th:href="@{/admin/rider/riderReg(page=${currentPage + 1}, size=${riderPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
       th:if="${riderPage.hasNext()}">
      다음
    </a>
  </div>

</div>
