<div class="store-admin-container" th:fragment="storesListContent">
  <!-- 헤더 섹션: 제목과 검색 바 -->
  <div class="store-admin-header">
    <h2 class="store-admin-title">가게 관리</h2>
    <div class="store-admin-search">
      <form class="store-admin-search-form" method="get" th:action="@{/admin/storesList}">
        <input name="searchQuery" placeholder="가게 이름 또는 카테고리 검색" th:value="${searchQuery}" type="text">

        <select class="store-admin-filter-select" name="category">
          <option value="">모든 카테고리</option>
          <option th:selected="${category == '한식'}" value="한식">한식</option>
          <option th:selected="${category == '중식'}" value="중식">중식</option>
          <option th:selected="${category == '일식'}" value="일식">일식</option>
          <option th:selected="${category == '양식'}" value="양식">양식</option>
        </select>

        <select class="store-admin-filter-select" name="status">
          <option value="">모든 상태</option>
          <option th:selected="${status == '승인'}" value="승인">승인</option>
          <option th:selected="${status == '차단'}" value="차단">차단</option>
          <option th:selected="${status == '폐점'}" value="폐점">폐점</option>
          <option th:selected="${status == '보류'}" value="보류">보류</option>
        </select>

        <button class="store-admin-search-button" type="submit">검색</button>
      </form>
    </div>
  </div>

  <!-- 가게 리스트 테이블 -->
  <table class="store-admin-table">
    <thead>
    <tr>
      <th>가게 ID</th>
      <th>가게 이름</th>
      <th>카테고리</th>
      <th>주소</th>
      <th>전화번호</th>
      <th>상태</th>
      <th>평점</th>
      <th>리뷰 수</th>
      <th>등록일</th>
      <th>수정</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="store : ${storesList}">
      <td th:text="${store.preStoId}">1</td>
      <td th:text="${store.preStoName}">가게 이름</td>
      <td th:text="${store.preStoCategory}">카테고리</td>
      <td th:text="${store.preStoAddress}">주소</td>
      <td th:text="${store.preStoPhone}">전화번호</td>
      <td>
        <span class="store-admin-data-status" th:text="${store.preStoStatus}">상태</span>
      </td>
      <td th:text="${store.preStoRating}">4.5</td>
      <td th:text="${store.preStoReviewCount}">10</td>
      <td th:text="${#temporals.format(store.preStoCreatedAt, 'yyyy-MM-dd HH:mm')}">2023-10-01 12:34</td>
      <td>
        <a class="store-admin-crystal-button" th:href="@{/admin/storesList/{id}/edit(id=${store.preStoId})}">수정</a>
      </td>
    </tr>
    </tbody>
  </table>

  <!-- 페이징 네비게이션 -->
  <div class="store-admin-pagination">
    <!-- 이전 페이지 링크 -->
    <a class="pagination-item"
       th:href="@{/admin/storesList(page=${currentPage - 1}, size=${storesPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
       th:if="${storesPage.hasPrevious()}">
      이전
    </a>

    <!-- 페이지 번호 링크 또는 현재 페이지 표시 -->
    <span th:each="i : ${#numbers.sequence(0, storesPage.totalPages - 1)}">
        <a class="pagination-item"
           th:href="@{/admin/storesList(page=${i}, size=${storesPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
           th:if="${i != currentPage}" th:text="${i + 1}">
        </a>
        <span aria-current="page"
              class="pagination-current"
              th:if="${i == currentPage}" th:text="${i + 1}">
        </span>
    </span>

    <!-- 다음 페이지 링크 -->
    <a class="pagination-item"
       th:href="@{/admin/storesList(page=${currentPage + 1}, size=${storesPage.size}, searchQuery=${searchQuery}, category=${category}, status=${status}, sortField=${sortField}, sortDir=${sortDir})}"
       th:if="${storesPage.hasNext()}">
      다음
    </a>
  </div>
</div>
