<div class="member-edit-container" th:fragment="store-editContent">
  <!-- 카드 컨테이너 -->
  <div class="member-edit-card">
    <!-- 프로필 헤더 -->
    <div class="member-edit-header">
      <h2 class="member-edit-title">프로필</h2>
    </div>

    <!-- 프로필 상세 -->
    <div class="member-edit-details">

      <div class="member-edit-info">
        <!-- 프로필 이미지 -->
        <div class="member-edit-image">
          <img alt="프로필 이미지" src="/admin/img/icons/user-profile.svg">
        </div>
        <!-- 프로필 정보 -->
        <div class="member-edit-basic-info">
          <h3 th:text="${store.preStoName}"></h3>
          <p class="member-edit-id">ID: <span th:text="${store.preStoCategory}"></span></p>
          <p>휴대전화번호: <span th:text="${store.preStoPhone}"></span></p>
          <p>주소: <span th:text="${store.preStoAddress}"></span></p>
        </div>
      </div>

      <!-- 프로필 수정 폼 -->
      <form class="member-edit-form" method="post" th:action="@{/admin/storesList/{id}/edit(id=${store.preStoId})}">

        <input type="hidden" th:value="${store.preStoName}" name="preStoName">
        <div class="form-row">
          <div class="form-group">
            <label for="status">가게 상태</label>
            <select class="form-control" id="status" name="preStoStatus" required th:value="${store.preStoStatus}">
              <option th:selected="${store.preStoStatus == '승인'}" value="승인">승인</option>
              <option th:selected="${store.preStoStatus == '보류'}" value="보류">보류</option>
              <option th:selected="${store.preStoStatus == '차단'}" value="차단">차단</option>
              <option th:selected="${store.preStoStatus == '폐점'}" value="폐점">폐점</option>
              <option th:selected="${store.preStoStatus == '중지'}" value="중지">중지</option>
            </select>
          </div>
        </div>

        <div class="form-actions">
          <button class="btn-reset" type="reset">리셋</button>
          <button class="btn-submit" type="submit">수정 완료</button>
        </div>
      </form>
    </div>
  </div>
</div>
