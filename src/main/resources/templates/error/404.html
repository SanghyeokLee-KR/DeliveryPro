<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>404 - 페이지를 찾을 수 없습니다</title>
    <!-- Google Fonts: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            height: 100vh;
            font-family: 'Roboto', sans-serif;
            color: #ffffff;
            background: linear-gradient(135deg, #f3b7b7, #e35d5b);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5rem;
            line-height: 1.4;
            margin-bottom: 30px;
        }
        a {
            display: inline-block;
            padding: 12px 24px;
            background-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 6px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: rgba(255, 255, 255, 0.4);
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 3.5rem;
            }
            p {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>404</h1>
    <p>죄송합니다. 요청하신 페이지를 찾을 수 없습니다.<br>URL을 다시 확인해 주세요.</p>
    <p><a href="/" th:href="@{/}">홈으로 돌아가기</a></p>
</div>
</body>
</html>
