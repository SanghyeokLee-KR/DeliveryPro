<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">

<body>

<input type="hidden" id="order-id" th:value="${session.orderId}">

<!-- 메인 레이아웃 -->

                    </div>

                    <div class="store-details-modify-modal-body">
                        <h3>매장 이름</h3>
                        <p>사용할 매장 이름을 입력해주세요</p>
                        <div class="store-details-modify-change-box">
                            <div class="store-details-input-con">
                                <input type="text" id="storeName-field" maxlength="20" required
                                       oninput="updateCharacterCount()"/>
                                <span class="store-detail-input-counter" id="char-count">0/20</span>

                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateStoreDetails('storeName')">확인</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="store-details-modify-modal" id="modal-category" style="display: none;">
            <div class="store-details-modify-modal-content">
                <span class="store-details-modify-close-btn" onclick="closeModal('modal-category')">&times;</span>
                <div class="store-details-modify-modal-all">
                    <div class="store-details-modify-modal-header">
                        <p>매장 종류 변경</p>
                    </div>
                    <hr style="width: 100%;"/>

                         style="display: flex; align-items: center; justify-content: space-evenly;">
                        <h3>매장 종류 선택 : </h3>
                        <div class="store-details-modify-change-box">
                            <select class="store-detail-category-choice" id="store-detail-category"
                                    name="preStoCategory" required>
                                <option value="">선택하세요</option>
                                <option value="패스트푸드">패스트푸드</option>
                                <option value="치킨">치킨</option>
                                <option value="피자">피자</option>
                                <option value="양식">양식</option>
                                <option value="중식">중식</option>
                                <option value="한식">한식</option>
                                <option value="도시락">도시락</option>
                                <option value="카페·디저트">카페·디저트</option>
                                <option value="샐러드">샐러드</option>
                                <option value="분식">분식</option>
                                <option value="족발·보쌈">족발·보쌈</option>
                                <option value="일식">일식</option>
                            </select>
                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateStoreDetails('category')">확인</button>
                    </div>

        </div>

        <div class="store-details-modify-modal" id="modal-address" style="display: none;">
            <div class="store-details-modify-modal-content">
                <span class="store-details-modify-close-btn" onclick="closeModal('modal-address')">&times;</span>
                <div class="store-details-modify-modal-all">
                    <div class="store-details-modify-modal-header">
                        <p>매장 주소 변경</p>
                    </div>
                    <hr style="width: 100%;"/>
                    <div class="store-details-modify-modal-body">
                        <h3>매장 주소</h3>
                        <p>사용할 매장 주소을 찾아 입력해주세요</p>
                        <div class="store-details-modify-change-box">
                            <!-- 다음 주소 api 들어갈 부분 -->
                            <input class="btn" type="button" onclick="sample6_execDaumPostcode()" value="우편번호 찾기"
                                   style="width: 120px;"/><br/>
                            <input type="text" size="40" id="sample6_address" placeholder="주소"/><br/>
                            <input type="text" size="40" id="sample6_detailAddress" placeholder="상세주소"/>
                            <!-- 도로명주소와 상세주소를 합쳐서 mAddr 이름으로 서버 전송 -->
                            <input type="hidden" id="preStoAddress" name="preStoAddress"/>
                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateAddress()">확인</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="store-details-modify-modal" id="modal-phone" style="display: none;">
            <div class="store-details-modify-modal-content">
                <span class="store-details-modify-close-btn" onclick="closeModal('modal-phone')">&times;</span>
                <div class="store-details-modify-modal-all">
                    <div class="store-details-modify-modal-header">
                        <p>매장 전화번호 변경</p>
                    </div>
                    <hr style="width: 100%;"/>
                    <div class="store-details-modify-modal-body">
                        <h3>매장 전화번호</h3>
                        <p>사용할 매장 전화번호를 찾아 입력해주세요</p>
                        <div class="store-details-modify-change-box">
                            <input type="text" id="phone-field">
                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateStoreDetails('phone')">확인</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="store-details-modify-modal" id="modal-intro" style="display: none;">
            <div class="store-details-modify-modal-content">
                <span class="store-details-modify-close-btn" onclick="closeModal('modal-intro')">&times;</span>
                <div class="store-details-modify-modal-all">

                        <div class="store-details-modify-change-box">

                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateStoreDetails('intro')">확인</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="store-details-modify-modal" id="modal-minOder" style="display: none;">
            <div class="store-details-modify-modal-content">
                <span class="store-details-modify-close-btn" onclick="closeModal('modal-minOder')">&times;</span>
                <div class="store-details-modify-modal-all">
                    <div class="store-details-modify-modal-header">

                    </div>
                    <hr style="width: 100%;"/>
                    <div class="store-details-modify-modal-body">
                        <h3>최소 주문 금액</h3>

        <div class="store-details-modify-modal" id="modal-deliFee" style="display: none;">

                        <div class="store-details-modify-change-box">
                            <input type="number" id="deliFee-field">
                        </div>
                    </div>
                    <div class="store-details-modify-modal-check-btn">
                        <button type="button" onclick="updateStoreDetails('deliFee')">확인</button>

<!-- 기존 JS 파일들 -->
<script src="/store/js/management.js"></script>

<!-- SockJS와 Stomp.js 라이브러리 로드 -->

<script src="/store/js/alarm.js"></script>

<script src="/store/js/store-registration.js"></script>
<script src="/store/js/store-review.js"></script>
<script src="/store/js/store-sales-static.js"></script>
<script src="/store/js/store-order.js"></script>
<script src="/store/js/store-Operating.js"></script>
<script src="/store/js/store-order-paging.js"></script>
<script src="/store/js/store-sales.js"></script>
<script src="https://ssl.daumcdn.net/dmaps/map_js_init/postcode.v2.js"></script>
<script>

    // 모든 li와 매칭되는 숨겨진 div 요소의 ID를 매핑
    const menuMapping = {
        "store-times": ".time-store-container", // 영업시간
        "store-closed": ".closed-store-container", // 휴무일
        "store-stop": ".stop-store-container", // 일시중지
        "store-timeview": ".timeview-store-container", // 영업시간 관리 메인
        "store-setting": ".setting-store-container", // 영업시간 관리 메인
        "store-delivery": ".delivery-store-container", // 배달지역 관리 (예시)
        "store-holiday": ".holiday-store-container", // 정기 휴무일 관리 (예시)
        "store-temholiday": ".temholiday-store-container", // 임시 휴무일 관리 (예시)
        "store-list-view": "#storeList",
        "store-add-btn": ".add-store-container",
        "store-menu-list": "#store-detail-menu-view",
        "store-modify": ".modi-store-container",
        "store-review": ".review-store-container", // 임시 휴무일 관리 (예시)
        "store-Notification": ".store-owner-notification",
        "orderbtn": ".OrderContainer",
        "delivery-management": ".delivery-manangement-container",
        "SSSbtn" : ".SSSContainer",
        "sales" : ".salesContainer"
    };

    // 매핑된 ID에 따라 이벤트 핸들러 추가
    Object.keys(menuMapping).forEach((menuId) => {
        const menuElement = document.getElementById(menuId);
        const targetContainer = $(menuMapping[menuId]); // jQuery로 선택

        if (menuElement && targetContainer) {
            menuElement.addEventListener("click", () => {
                // 먼저 모든 컨테이너를 숨김
                Object.values(menuMapping).forEach((selector) => {
                    const container = $(selector); // jQuery로 선택
                    if (container.length) { // 컨테이너가 존재하면
                        container.hide(); // 컨테이너를 숨김
                    }
                });

                // 클릭한 메뉴에 해당하는 컨테이너만 보이게 함
                if (targetContainer.is(":hidden")) { // targetContainer가 숨겨져 있으면
                    targetContainer.show(); // 보이게 설정
                }
            });
        } else {
            console.warn(`요소를 찾을 수 없습니다. ID: ${menuId}, 컨테이너: ${menuMapping[menuId]}`);
        }
    });

    // 이미지 선택 시 미리보기
    $('#mpFile').on('change', function (event) {
        const file = event.target.files[0];  // 선택된 파일
        if (file) {
            // 이미지 파일만 처리
            const reader = new FileReader();  // 파일 리더 객체

            // 파일 리더로 이미지 파일을 읽고, 미리보기 업데이트
            reader.onload = function (e) {
                const imgUrl = e.target.result;  // 읽은 이미지의 URL

                // 이미지 미리보기 업데이트
                $('#menuImagePreview').attr('src', imgUrl);  // 미리보기 이미지 설정
                $('#menu-img-title').text("변경할 이미지: ");  // 텍스트 변경
                $('#menuImgName').text(file.name);  // 선택한 파일 이름 텍스트로 표시
            };

            // 파일 읽기 (이미지 파일을 읽어들임)
            reader.readAsDataURL(file);
        } else {
            // 파일을 선택하지 않으면 미리보기 비우기
            $('#menuImagePreview').attr('src', '');  // 빈 상태로 설정
            $('#menu-img-title').text("현재 적용중인 이미지: ");  // 텍스트 원래대로 되돌리기
            $('#menuImgName').text('');  // 텍스트 비우기
        }
    });

    // 파일 선택 시 미리보기 및 히든 필드 업데이트
    $(document).on('change', '#mpFile', function (event) {
        const file = event.target.files[0];  // 사용자가 선택한 파일
        if (file) {
            // 파일 이름을 'menuPictureUrl' 히든 필드에 저장
            $('#menuPictureUrl').val(file.name);

            // 선택한 파일의 이름을 텍스트로 표시
            $('#menuImgName').text(file.name);

            // 선택한 파일을 미리보기 이미지로 표시
            const reader = new FileReader();
            reader.onload = function (e) {
                $('#menuImagePreview').attr('src', e.target.result);  // 미리보기 이미지로 설정
            };
            reader.readAsDataURL(file);
        } else {
            // 파일을 선택하지 않았을 경우 히든 필드와 미리보기 이미지 초기화
            $('#menuPictureUrl').val('');
            $('#menuImgName').text('');
            $('#menuImagePreview').attr('src', '');  // 빈 이미지로 처리
        }
    });

    // 주소 관리 함수 (Daum Postcode API 기본 팝업 사용)
    function openPostcode() {
        new daum.Postcode({
            oncomplete: function (data) {
                // 선택한 주소 타입에 따라 주소 값을 가져옴
                var address = '';
                if (data.userSelectedType === 'R') { // 도로명 주소
                    address = data.roadAddress;
                } else { // 지번 주소
                    address = data.jibunAddress;
                }

                if (address.indexOf("미추홀구") === -1) {
                    alert("미추홀구에 해당하는 주소만 선택 가능합니다. 다시 선택해주세요.");
                    return; // 주소 업데이트 중단
                }


                // 기본 주소 필드에 값 설정
                document.getElementById('store-address').value = address;
            }
        }).open();
    }

    // 폼 제출 시 주소 결합하여 preStoAddress에 설정
    document.getElementById('add-store-form').addEventListener('submit', function (event) {
        // 기본 주소와 상세 주소 가져오기
        var baseAddress = document.getElementById('store-address').value.trim();
        var detailAddress = document.getElementById('store-detail-address').value.trim();

        // 기본 주소가 입력되지 않은 경우 경고 표시
        if (!baseAddress) {
            alert('주소를 입력해주세요.');
            event.preventDefault(); // 폼 제출 중단
            return;
        }

        // 상세 주소가 입력되지 않은 경우 경고 표시
        if (!detailAddress) {
            alert('상세 주소를 입력해주세요.');
            event.preventDefault(); // 폼 제출 중단
            return;
        }

        // 전체 주소 결합 (공백으로 구분)
        var fullAddress = baseAddress + ' ' + detailAddress;

        // 결합된 주소를 preStoAddress 필드에 설정
        document.getElementById('preStoAddress').value = fullAddress;
    });

    $(document).ready(function () {
        const preStoIdElement = document.getElementById("preSto-id");

        const preStoId = preStoIdElement.value;

        $.ajax({
            url: `/api/stores/storeName/${preStoId}`,
            method: 'POST',  // API에 맞게 설정 (POST 혹은 GET)
            success: function (result) {
                $(`#StoreName`).text(result);
            },
            error: function (xhr, status, error) {
                console.error("리뷰 데이터를 가져오는 중 오류 발생:", error);
            }
        })
    })
</script>
