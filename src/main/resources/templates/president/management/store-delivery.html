<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>사장님 셀프서비스</title>
    <link rel="stylesheet" href="/store/css/store-delivery.css">
    <link rel="shortcut icon" href="/favicon-2.ico" type="image/x-icon"/>
</head>
<body>

<div th:fragment="store-delivery">
    <div class="delivery-container">
        <div class="store-delivery-section">
            <div class="delivery-header">
                <p class="store-delivery-text">배달 지역 관리</p>
                <br/>
                <p class="store-delivery-text2"> · 배달 가능 상태를 오늘 불가로 설정하면, 해당 지역은 마감 시간까지 주문을 받을 수 없습니다.<br>
                    · 영업시간이 끝나면 자동으로 배달 불가 처리가 해제되어 다음 영업일에는 주문을 받을 수 있습니다.</p>
            </div>

            <br/>
            <div class="line"></div>
            <br/>


            <div class="container2">
                <p class="store-delivery-text">지역별 배달 설정</p>
                <table>
                    <tr>
                        <th style="width: 70%;">배달 지역</th>
                        <th style="width: 30%;">배달 가능 상태</th>
                    </tr>
                    <tr>
                        <td>인천광역시 미추홀구</td>
                        <td>
                            <div class="toggle-container">
                                <span class="toggle-label">가능</span>
                                <div class="toggle on"></div>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td>인천광역시 부평구</td>
                        <td>
                            <div class="toggle-container">
                                <span class="toggle-label">불가능</span>
                                <div class="toggle"></div>
                            </div>
                        </td>
                    </tr>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
        crossorigin="anonymous"></script>
<!-- JS: 펼치기/접기 구현 -->
<script src="/store/js/management.js"></script>

</body>
</html>
