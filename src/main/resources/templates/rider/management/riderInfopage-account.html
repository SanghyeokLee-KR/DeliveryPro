<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사장님 셀프서비스</title>
    <link rel="stylesheet" href="/layout/rider/css/header.css">
    <link rel="stylesheet" href="/layout/rider/css/sidebar.css">
    <link rel="stylesheet" href="/rider/css/rider-management.css">
    <link rel="stylesheet" href="/rider/css/rider-account.css">
    <link rel="shortcut icon" href="/favicon-3.ico" type="image/x-icon"/>
</head>

<body>
<!-- 상단 헤더 -->
<header class="header" th:insert="~{layout/rider/management/management-header :: managementheaderContent}"></header>
<!-- 메인 레이아웃 -->
<div class="main-container">
    <!-- 왼쪽 사이드바 -->
    <aside class="sidebar"
           th:insert="~{layout/rider/management/management-sidebar :: managementsidebarContent}"></aside>

    <!-- 오른쪽 메인 콘텐츠 영역 -->
    <main class="main-content">
        <div class="rider-account-container">
            <div class="rider-account-padding">
                <div class="rider-account-account-header"><h1>지급받을 계좌</h1></div>
                <div class="rider-account-account-sheader"><h2>은행 계좌 정보</h2></div>
                <div class="rider-account-form-all">
                    <div class="rider-account-form-test">
                        <form action="/addRiderAccount" method="POST" style="display: flex; justify-content: space-between; gap: 15px;" onsubmit="cleanAccountNumber()">
                            <input type="hidden" th:value="${session.rider_no}" name="riderNo">
                            <input type="hidden" th:value="${session.rider_name}" name="riderAccountHolder">

                            <div class="rider-account-form-group">
                                <select id="bank" name="riderBankName">
                                    <option value="">은행 선택</option>
                                    <option value="카카오뱅크">카카오뱅크</option>
                                    <option value="국민은행">국민은행</option>
                                    <option value="하나은행">하나은행</option>
                                </select>
                            </div>

                            <div class="rider-account-form-group1">
                                <input type="text" id="account-number" name="riderAccountNumber" placeholder="계좌번호 (- 없이 입력)" oninput="updateCharacterCount()">
                                <span class="rider-account-input-counter" id="char-count">0/14</span>
                            </div>

                            <div class="rider-account-register-button-div">
                                <button class="rider-account-register-button">등록하기</button>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="rider-account-form-all1">
                    <div id="riderAccountList"></div>
                    <div class="rider-account-notes">
                        • 수익은 매주 월요일 오전 10시에서 저녁 7시 사이에 입금됩니다.<br>
                        • 지급일이 휴일일 경우엔 휴일 전 영업일에 수익이 입금됩니다.<br>
                        • 출금 계좌는 즉시 변경됩니다. 단 한국 시간 23:30-01:00에는 은행 점검으로 계좌 등록이<br/>　어려울 수 있으니 점검이 끝난 이후에 출금 계좌 변경을 진행해 주세요.<br>
                        • 정산 계좌는 본인명의의 계좌만 등록 가능합니다.<br>
                        • 계좌는 1개만 등록 가능합니다.
                    </div>
                </div>
            </div>
        </div>

        <!-- 모달 창 -->
        <div id="crystal-modal" class="crystal-modal">
            <div class="crystal-modal-content">
                <span id="close-modal" class="crystal-close">&times;</span>
                <h2>임수정, 류수정, 정수정</h2>
                <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; border: 1px solid #ccc; border-radius: 8px;">
                    <p>수정하고 싶니? 근데 이걸 어쩌니?</p>
                    <p> 그런 기능은 안만들어줄꼰데?</p>
                    <img src="https://s3.orbi.kr/data/file/united2/a9697afd712e4edf8f2acb5b9718aa5d.jpeg" width="300" />
                </div>
            </div>
        </div>
    </main>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
<script src="/rider/js/management_sh.js"></script>
<script src="/rider/js/rider-management.js"></script>
</body>

</html>
