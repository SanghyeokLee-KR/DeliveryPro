<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>사장님 셀프서비스</title>
    <link rel="stylesheet" href="/layout/rider/css/header.css">
    <link rel="stylesheet" href="/layout/rider/css/sidebar.css">
    <link rel="stylesheet" href="/rider/css/rider-management.css">
    <link rel="stylesheet" href="/rider/css/rider-myprofile.css">
    <link rel="shortcut icon" href="/favicon-3.ico" type="image/x-icon"/>
</head>

<body>
<!-- 상단 헤더 -->
<header class="header" th:insert="~{layout/rider/management/management-header :: managementheaderContent}"></header>
<!-- 메인 레이아웃 -->
<div class="main-container">
    <!-- 왼쪽 사이드바 -->
    <aside class="sidebar"
           th:insert="~{layout/rider/management/management-sidebar :: managementsidebarContent}"></aside>


    <!-- 오른쪽 메인 콘텐츠 영역 -->
    <main class="main-content">
        <div class="rider-myprofile-profile-card">
            <div class="rider-myprofile-profile-header">
                <h1>프로필</h1>
                <button class="rider-myprofile-exit-button">탈퇴하기　</button>
            </div>
            <div class="rider-myprofile-profile-content">
                <div class="myprofile-header">
                    <div class="rider-myprofile-profile-avatar">
                        <div class="rider-myprofile-avatar-placeholder"></div>
                    </div>
                    <div class="myprofile-header-2">
                        <div class="myprofile-header-1">
                            <h2 th:text="${session.rider_name}"></h2>
                            <div class="rider-myprofile-badge"><p>　라이더　</p></div>
                        </div>
                        <div class="myprofile-id">
                            <p th:text="${session.rider_id}"></p>
                        </div>
                    </div>
                </div>

                <div class="rider-myprofile-info">
                    <div class="rider-myprofile-details">
                        <div class="rider-myprofile-detail">연락처</div>
                        <div class="rider-myprofile-detail">이메일</div>
                        <div class="rider-myprofile-detail">생년월일</div>
                        <div class="rider-myprofile-detail">성별</div>
                        <div class="rider-myprofile-detail">이동수단</div>
                    </div>
                    <div class="rider-myprofile-detail-infos">
                        <div class="rider-myprofile-detail-info">
                            <span th:text="${session.rider_Phone}"></span>
                        </div>
                        <div class="rider-myprofile-detail-info">
                            <span th:text="${session.rider_email != null and !session.rider_email.isEmpty() ? session.rider_email : 'Email not available'}"></span>
                        </div>
                        <div class="rider-myprofile-detail-info">
                            <span th:text="${session.rider_birth}"></span>
                        </div>
                        <div class="rider-myprofile-detail-info">
                            <span th:text="${session.rider_gender}"></span>
                        </div>
                        <div class="rider-myprofile-detail-info">
                            <span th:text="${session.rider_vehicleType}"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="rider-myprofile-button">
                <button class="rider-myprofile-edit-button">수정하기　</button>
            </div>
        </div>
    </main>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
        crossorigin="anonymous"></script>
<script src="/rider/js/management_sh.js"></script>

</body>
</html>
