<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>사장님 셀프서비스</title>
  <link rel="stylesheet" href="/layout/rider/css/header.css">
  <link rel="stylesheet" href="/layout/rider/css/sidebar.css">
  <link rel="stylesheet" href="/rider/css/rider-management.css">
  <link rel="stylesheet" href="/rider/css/rider-adjustment.css">
  <link rel="shortcut icon" href="/favicon-3.ico" type="image/x-icon"/>
</head>

<body>
<!-- 상단 헤더 -->
<header class="header" th:insert="~{layout/rider/management/management-header :: managementheaderContent}"></header>
<!-- 메인 레이아웃 -->
<div class="main-container">
  <!-- 왼쪽 사이드바 -->
  <aside class="sidebar"
         th:insert="~{layout/rider/management/management-sidebar :: managementsidebarContent}"></aside>


  <!-- 오른쪽 메인 콘텐츠 영역 -->
  <main class="main-content">
    <section class="settlement-section">
      <div class="settlement-header">
        <h2>정산내역</h2>
        <div class="monthly-info">
          <span class="rider-revenue">1월 수익 <span class="revenue-scheduled">(예정포함)</span></span>
          <span class="monthly-amount">827,000원</span>
        </div>
      </div>
      <hr/>
      <div class="settlement-filter">
        <label for="month-select">정산 월</label>
        <select id="month-select" name="month">
          <option value="2025-01" selected>2025년 01월</option>
          <!-- 추가 월 옵션 -->
        </select>
      </div>
      <table class="settlement-table">
        <thead>


        <tr>
          <th>정산일</th>
          <th>상태</th>
          <th>입금금액</th>
          <th>기간</th>
        </tr>
        </thead>
        <tbody>
        <tr>
          <td>2025.01.13</td>
          <td><span class="status status-scheduled">입금예정</span></td>
          <td>300,800원</td>
          <td>2025.01.06 ~ 2025.01.12</td>
        </tr>
        <tr>
          <td>2025.01.06</td>
          <td><span class="status status-completed">입금완료</span></td>
          <td>526,200원</td>
          <td>2024.12.30 ~ 2025.01.05</td>
        </tr>
        </tbody>
      </table>
      <div class="pagination">
        <button class="page-btn">1</button>
        <button class="page-btn">2</button>
      </div>
    </section>
  </main>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
        crossorigin="anonymous"></script>
<script src="/rider/js/management_sh.js"></script>
</body>
</html>
