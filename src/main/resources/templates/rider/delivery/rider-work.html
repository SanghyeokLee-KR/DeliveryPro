<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>라이더 배달 서비스</title>
    <!-- CSS 파일들 -->
    <link rel="stylesheet" href="/layout/rider/css/delivery-header.css"/>
    <link rel="stylesheet" href="/layout/rider/css/delivery-sidebar.css"/>
    <link rel="stylesheet" href="/rider/css/rider-management.css"/>
    <link rel="stylesheet" href="/rider/css/main.css"/>
    <link rel="shortcut icon" href="/favicon-3.ico" type="image/x-icon"/>
    <style>
        /* 지도 위 액션버튼 등 */
        .segment-info {
            font-weight: bold;
            margin-left: 5px;
        }
        .map-action-btn {
            background-color: #FFA500;
            color: #fff;
            padding: 5px 10px;
            border: none;
            cursor: pointer;

        }
        .map-action-btn.disabled {
            background-color: #A9A9A9;
            cursor: default;
        }
        .auto-follow-container {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 999;
            background: rgba(255, 255, 255, 0.9);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 14px;
        }
        /* 금액 표시용(거리 덮어쓰기 방지) */
        .price-info {
            font-weight: bold;
            text-align: right;
            display: inline-block;
            min-width: 60px;
            white-space: nowrap;
            margin-left: 5px;
        }
    </style>
</head>
<body>
<!-- 헤더 영역 (Thymeleaf 삽입) -->
<header class="header" th:insert="~{layout/rider/delivery/delivery-header :: deliveryheaderContent}"></header>

<!-- 메인 레이아웃 컨테이너 -->
<div class="main-container">
    <!-- 사이드바 영역 (Thymeleaf fragment 삽입) -->
    <aside class="sidebar" th:insert="~{layout/rider/delivery/delivery-sidebar :: deliverysidebarContent}"></aside>

    <!-- 자동 팔로우 토글 UI -->
    <div class="auto-follow-container">
        <label>
            <input type="checkbox" id="autoFollowToggle" checked/>
            자동 팔로우
        </label>
    </div>

    <!-- 메인 콘텐츠 영역 -->
    <main class="main-content">
        <!-- 지도 표시 영역 -->
        <div id="main_map"></div>
        <!-- 거리/소요시간 및 액션 버튼 표시 영역 -->
        <div id="distanceInfoSidebar" style="padding:10px; font-size:16px;"></div>
    </main>
</div>

<!-- 카카오 지도 SDK (appkey 포함) -->
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=d8822c35851508a88d440e6883daef52&libraries=services" type="text/javascript"></script>
<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.js"
        integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
        crossorigin="anonymous"></script>
<!-- 분리된 자바스크립트 파일 (haversine_formula.js) -->
<script src="/rider/js/haversine_formula.js"></script>
<script>
    /////////////////////////////////////////////////////////////
    // (참고용) 콜 타임 포맷팅 함수
    function formatCallTime(callTime) {
        if (!callTime) return "null";
        let date = new Date(callTime.replace(/-/g, '/'));
        let year = date.getFullYear();
        let month = String(date.getMonth() + 1).padStart(2, '0');
        let day = String(date.getDate()).padStart(2, '0');
        let hour = String(date.getHours()).padStart(2, '0');
        let min = String(date.getMinutes()).padStart(2, '0');
        let sec = String(date.getSeconds()).padStart(2, '0');
        return `${year}-${month}-${day} ${hour}:${min}:${sec}`;
    }
    /////////////////////////////////////////////////////////////
    // 자동 팔로우 여부 플래그
    let autoFollow = true;
    $(function () {
        $('#autoFollowToggle').on('change', function () {
            autoFollow = $(this).is(':checked');
            console.log("자동 팔로우 모드:", autoFollow);
        });
    });
    /////////////////////////////////////////////////////////////
    // 두 좌표 비교 (오차 허용치)
    function isSamePoint(p1, p2) {
        const threshold = 0.0001;
        return Math.abs(Number(p1.x) - Number(p2.x)) < threshold &&
            Math.abs(Number(p1.y) - Number(p2.y)) < threshold;
    }
    /////////////////////////////////////////////////////////////
    // 주소 정리: 앞쪽 숫자(지번) 제거
    function cleanAddress(address) {
        if (typeof address !== "string") {
            address = address.address || address.toString();
        }
        let parts = address.trim().split(/\s+/);
        if (parts.length > 0 && /^\d+$/.test(parts[0])) {
            parts.shift();
        }
        return parts.join(" ");
    }
    /////////////////////////////////////////////////////////////
    // KakaoGeocoderUtil (지오코딩 + 최적화)
    const KakaoGeocoderUtil = {
        geocodeAddress: function (address, callback) {
            if (typeof address !== "string") {
                address = address.address || "";
            }
            let cleanedAddress = cleanAddress(address);
            console.log("[KakaoGeocoderUtil] 정제된 주소:", cleanedAddress);
            let geocoder = new kakao.maps.services.Geocoder();
            geocoder.addressSearch(cleanedAddress, function (result, status) {
                if (status === kakao.maps.services.Status.OK) {
                    let coords = {x: result[0].x, y: result[0].y};
                    console.log("[KakaoGeocoderUtil] 좌표:", coords);
                    callback(coords);
                } else {
                    console.error("[KakaoGeocoderUtil] 주소 검색 실패:", cleanedAddress);
                    callback(null);
                }
            });
        },
        geocodeAddresses: function (addresses, callback) {
            let addressStrings = addresses.map(addr =>
                (typeof addr === "string") ? addr : (addr.address || ""));
            let results = [];
            let count = addressStrings.length;
            addressStrings.forEach(function (addr, idx) {
                KakaoGeocoderUtil.geocodeAddress(addr, function (coords) {
                    results[idx] = coords;
                    if (results.filter(r => r !== null && r !== undefined).length === count) {
                        console.log("[KakaoGeocoderUtil] 모든 주소의 좌표:", results);
                        callback(results);
                    }
                });
            });
        },
        RouteOptimizer: {
            // 근사 알고리즘 (최근접 이웃)
            optimizeRouteOrder: function (start, destinations) {
                let remaining = destinations.slice();
                let ordered = [];
                let current = start;
                while (remaining.length > 0) {
                    let nearestIndex = 0;
                    let nearestDist = Number.MAX_VALUE;
                    for (let i = 0; i < remaining.length; i++) {
                        let d = Math.hypot(Number(current.x) - Number(remaining[i].x),
                            Number(current.y) - Number(remaining[i].y));
                        if (d < nearestDist) {
                            nearestDist = d;
                            nearestIndex = i;
                        }
                    }
                    let nextPoint = remaining[nearestIndex];
                    ordered.push(nextPoint);
                    current = nextPoint;
                    remaining.splice(nearestIndex, 1);
                }
                return ordered;
            }
        }
    };
    /////////////////////////////////////////////////////////////
    // 지도, 마커, 경로 변수
    let map1;
    let polylines = [];
    let riderOverlays = [];
    const driverX = 126.675113024566; // 라이더 초기 X
    const driverY = 37.4388938204128; // 라이더 초기 Y
    let storeMarker = null;
    let actionOverlay = null;
    const segmentColors = ["#FF0000", "#0000FF", "#00AA00", "#FFA500"];
    /////////////////////////////////////////////////////////////
    // 배달 데이터 전역
    let groupDeliveryData = [];
    let singleDeliveryData = [];
    /////////////////////////////////////////////////////////////
    // 각 카드 거리 업데이트 (매장→고객, 고객→고객)
    function updateCardDistance($card) {
        let storeAddr = $card.data("store-address");
        let customerAddrsData = $card.data("customer-addresses");
        let customerAddrs = (typeof customerAddrsData === "object") ?
            customerAddrsData : JSON.parse(customerAddrsData);
        // 매장 좌표
        KakaoGeocoderUtil.geocodeAddress(storeAddr, function (storeCoords) {
            if (!storeCoords) return;
            // 매장 ~ 라이더 거리
            $.ajax({
                url: "/calcDistance",
                type: "POST",
                data: {
                    fromX: driverX,
                    fromY: driverY,
                    toX: storeCoords.x,
                    toY: storeCoords.y
                },
                dataType: "json",
                success: function (response) {
                    let distance = response.distance;
                    // data-seg-index="0" 만 업데이트
                    $card.find("span.segment-info[data-seg-index='0']").text(distance + "m");
                }
            });
            // 매장 ~ 첫 고객, 이후 고객 간 거리
            let prevCoord = storeCoords;
            customerAddrs.forEach(function (addr, index) {
                KakaoGeocoderUtil.geocodeAddress(addr, function (custCoords) {
                    if (!custCoords) return;
                    $.ajax({
                        url: "/calcDistance",
                        type: "POST",
                        data: {
                            fromX: prevCoord.x,
                            fromY: prevCoord.y,
                            toX: custCoords.x,
                            toY: custCoords.y
                        },
                        dataType: "json",
                        success: function (res) {
                            let dist = res.distance;
                            // 매장 이후는 index 순서대로
                            let $customerSpan = $card.find("span.segment-info")
                                .not("[data-seg-index='0']")
                                .eq(index);
                            $customerSpan.text(dist + "m");
                            prevCoord = custCoords;
                        }
                    });
                });
            });
        });
    }
    function updateCardDistances() {
        $(".group-delivery-card").each(function () {
            updateCardDistance($(this));
        });
    }
    /////////////////////////////////////////////////////////////
    // 페이지 로드 시
    $(function () {
        initMap();
        // 탭 전환 (예제용)
        $("input[name='delivery-status']").on('change', function () {
            let val = $(this).val();
            if (val === "배차") {
                $("#tab-batcha, #tab-batcha2, #tab-jinhaeng, #tab-done").hide();
                $("#tab-batcha, #tab-batcha2").show();
            } else if (val === "진행중") {
                $("#tab-batcha, #tab-batcha2").hide();
                $("#tab-jinhaeng").show();
                $("#tab-done").hide();
            } else {
                $("#tab-batcha, #tab-batcha2, #tab-jinhaeng").hide();
                $("#tab-done").show();
            }
        });
        $("input[name='delivery-status']:checked").trigger("change");
        // 주문 목록 AJAX 호출 (서버에서 JSON 데이터 받음)
        $.ajax({
            url: "/orders/riderOrderList",
            type: "POST",
            dataType: "json",
            success: function (res) {
                console.log("[riderOrderList] result=", res);
                renderGroupDelivery(res);
                renderSingleDelivery(res);
                updateCardDistances();
            },
            error: function (err) {
                console.error("[riderOrderList] Ajax Error:", err);
            }
        });
        // 수락 버튼 클릭 (그룹 및 단일 배달 모두 처리)
        $(document).on("click", ".delivery-action", function () {
            let $card = $(this).closest(".group-delivery-card");
            console.log("주문 li 요소들:", $card.find("li[data-order-id]"));
            // 그룹 배달인 경우 data-delivery-ids 속성이 존재
            let deliveryIds = $card.data("delivery-ids");
            if (deliveryIds) {
                $.ajax({
                    url: '/api/delivery/accept',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ deliveryIds: deliveryIds }),
                    dataType: 'json',
                    success: function(response) {
                        console.log("수락 성공:", response);
                        $card.appendTo("#inProgressBox");
                        $card.find(".delivery-action").remove();

                        $("input[name='delivery-status'][value='진행중']")
                            .prop("checked", true)
                            .trigger("change");

                        preloadRoute($card);
                    },
                    error: function(err) {
                        console.error("수락 실패:", err);
                        alert("배달 수락에 실패하였습니다.");
                    }
                });
            } else {
                // 단일 배달인 경우 (간단히 처리)
                $.ajax({
                    url: '/api/delivery/accept', // 단일 배달도 같은 엔드포인트에서 처리 가능하도록 구성
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ deliveryIds: [$card.attr("id")] }),
                    dataType: 'json',
                    success: function(response) {
                        console.log("수락 성공:", response);
                        $card.appendTo("#inProgressBox");
                        $card.find(".delivery-action").remove();
                        preloadRoute($card);
                    },
                    error: function(err) {
                        console.error("수락 실패:", err);
                        alert("배달 수락에 실패하였습니다.");
                    }
                });
            }
        });
        // 정렬 select -> "보기" 클릭 (예제)
        $("#view-button").on("click", function () {
            const criteria = $("#sort-select").val();
            sortGroupData(criteria);
            sortSingleData(criteria);
        });
    });
    /////////////////////////////////////////////////////////////
    // 지도 초기화
    function initMap() {
        map1 = new kakao.maps.Map(document.getElementById('main_map'), {
            center: new kakao.maps.LatLng(driverY, driverX),
            level: 3
        });
        // 라이더 오버레이
        let riderDiv = document.createElement("div");
        riderDiv.id = "riderOverlay-" + Date.now();
        riderDiv.style.width = "80px";
        riderDiv.style.height = "38px";
        riderDiv.style.backgroundImage = "url('/rider/img/car.png')";
        riderDiv.style.backgroundSize = "contain";
        riderDiv.style.backgroundPosition = "center";
        riderDiv.style.backgroundRepeat = "no-repeat";
        riderDiv.style.position = "absolute";
        riderDiv.style.transform = "rotate(0deg)";
        riderDiv.style.zIndex = "100";
        riderDiv.style.pointerEvents = "none";
        let newRiderOverlay = new kakao.maps.CustomOverlay({
            position: new kakao.maps.LatLng(driverY, driverX),
            content: riderDiv,
            yAnchor: 0.5,
            xAnchor: 0.5
        });
        newRiderOverlay.setMap(map1);
        riderOverlays.push(newRiderOverlay);
    }
    /////////////////////////////////////////////////////////////
    // 경로 프리로드
    function preloadRoute($card) {
        const storeAddr = $card.data("store-address");
        let customerAddrsData = $card.data("customer-addresses");
        if (!customerAddrsData) return;
        const customerAddrs = (typeof customerAddrsData === "object")
            ? customerAddrsData
            : JSON.parse(customerAddrsData);
        KakaoGeocoderUtil.geocodeAddress(storeAddr, function (storeCoords) {
            if (!storeCoords) return;
            addStoreMarker(storeCoords.x, storeCoords.y);
            let customerAddrStrs = customerAddrs.map(item =>
                (typeof item === "string") ? item : (item.address || "")
            );
            KakaoGeocoderUtil.geocodeAddresses(customerAddrStrs, function (customerCoordsArray) {
                let uniqueCustomerCoords = [];
                customerCoordsArray.forEach(function (coord, idx) {
                    if (coord && !uniqueCustomerCoords.some(c => isSamePoint(c, coord))) {
                        uniqueCustomerCoords.push(coord);
                        addCustomerMarker(coord.x, coord.y, customerAddrStrs[idx]);
                    }
                });
                let optimizedRoute = KakaoGeocoderUtil.RouteOptimizer
                    .optimizeRouteOrder(storeCoords, uniqueCustomerCoords);
                // 라이더 위치에서 매장까지 경로 요청 및 애니메이션 (매장은 픽업 구간)
                requestRouteAndAnimate(driverX, driverY, storeCoords.x, storeCoords.y, "#FF0000", function () {
                    console.log("매장 도착! 이후 고객 구간");
                    // 매장에 해당하는 첫 번째 segment-info(픽업 정보)를 "픽업완료"로 업데이트
                    $card.find("span.segment-info[data-seg-index='0']").text("픽업완료");
                    // 매장 도착 후 고객 구간 처리를 시작 (여기서부터는 집(배달) 구간)
                    processRouteSegments(storeCoords, optimizedRoute, $card);
                });
            });
        });
    }
    // 경로 요청 + 폴리라인 + 애니메이션
    function requestRouteAndAnimate(fromX, fromY, toX, toY, color, onFinish) {
        $.ajax({
            url: '/pointAjax',
            type: 'POST',
            data: {fromX, fromY, toX, toY},
            dataType: 'json',
            success: function (routeResult) {
                drawRouteOnMapWithColor(routeResult, color);
                let path = [];
                routeResult.segments.forEach(function (segment) {
                    segment.coords.forEach(function (point) {
                        path.push(new kakao.maps.LatLng(point.y, point.x));
                    });
                });
                animatePath(path, onFinish);
            },
            error: function (err) {
                console.error("[requestRouteAndAnimate] 경로 오류:", err);
            }
        });
    }
    // 라이더 아이콘 애니메이션
    function animatePath(path, onFinish) {
        if (riderOverlays.length < 1) return;
        let myRiderOverlay = riderOverlays[riderOverlays.length - 1];
        let idx = 0, fraction = 0;
        function step() {
            if (idx >= path.length - 1) {
                if (onFinish) onFinish();
                return;
            }
            if (fraction >= 1.0) {
                fraction = 0;
                idx++;
                if (idx >= path.length - 1) {
                    if (onFinish) onFinish();
                    return;
                }
            }
            let start = path[idx], end = path[idx + 1];
            if (!end) {
                if (onFinish) onFinish();
                return;
            }
            let lat = start.getLat() + (end.getLat() - start.getLat()) * fraction;
            let lng = start.getLng() + (end.getLng() - start.getLng()) * fraction;
            let currentPos = new kakao.maps.LatLng(lat, lng);
            myRiderOverlay.setPosition(currentPos);
            if (autoFollow) map1.setCenter(currentPos);
            let angle = calculateBearing(start, end);
            angle = (angle - 90 + 360) % 360;
            let riderElem = myRiderOverlay.getContent();
            if (riderElem) {
                riderElem.style.transform = `rotate(${angle}deg)`;
            }
            fraction += 0.02;
            requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    }
    // 구간별 애니메이션
    // 각 구간별 애니메이션 처리 (수정된 부분)
    function processRouteSegments(startPoint, optimizedRoute, $card) {
        let currentPoint = startPoint;
        function processNextSegment(index) {
            if (index >= optimizedRoute.length) {
                // 모든 고객 구간을 완료하면 최종 배달완료 버튼 표시
                showFinalDeliveryCompleteButton($card);
                return;
            }
            let nextPoint = optimizedRoute[index];
            showActionButtonOnMap("배달", function () {
                requestRouteAndAnimate(
                    currentPoint.x, currentPoint.y,
                    nextPoint.x, nextPoint.y,
                    "#0000FF", function () {
                        // 도착 후 해당 주문(li[data-order-id]) 업데이트 (여기서 집 배달 완료)
                        let $orderLi = $card.find("li[data-order-id]").eq(index);
                        if ($orderLi.length > 0) {
                            let orderId = $orderLi.data('order-id');
                            console.log("도착 후 처리할 orderId:", orderId);
                            if (orderId) {
                                let $segmentSpan = $orderLi.find("span.segment-info");
                                completeOrderSegment(orderId, $segmentSpan, "배달완료");
                            } else {
                                console.error("orderId is undefined at index", index);
                            }
                        } else {
                            console.warn("No order element found at index", index, ". Skipping completeOrderSegment.");
                        }
                        currentPoint = nextPoint;
                        processNextSegment(index + 1);
                    }
                );
            });
        }
        processNextSegment(0);
    }

    // 지도 위 액션 버튼
    function showActionButtonOnMap(label, callback) {
        if (actionOverlay) {
            actionOverlay.setMap(null);
        }
        let btnDiv = document.createElement("div");
        btnDiv.className = "action-overlay";
        btnDiv.innerHTML = `<button class="map-action-btn">${label}</button>`;
        actionOverlay = new kakao.maps.CustomOverlay({
            position: map1.getCenter(),
            content: btnDiv,
            xAnchor: 0.5,
            yAnchor: 1.2
        });
        actionOverlay.setMap(map1);
        btnDiv.querySelector("button").addEventListener("click", function () {
            if (callback) callback();
            actionOverlay.setMap(null);
        });
    }
    // 최종 배달완료 버튼
    function showFinalDeliveryCompleteButton($card, deliveryId) {
        // deliveryId가 전달되지 않았다면 카드의 data-delivery-ids 속성에서 추출
        if (!deliveryId) {
            let deliveryIds = $card.data("delivery-ids");
            // data-delivery-ids가 문자열이라면 JSON 파싱
            if (typeof deliveryIds === "string") {
                try {
                    deliveryIds = JSON.parse(deliveryIds);
                } catch (e) {
                    console.error("delivery-ids 파싱 실패:", e);
                }
            }
            // 배열인 경우 첫 번째 값을 사용 (필요에 따라 로직 수정)
            deliveryId = (Array.isArray(deliveryIds) && deliveryIds.length > 0)
                ? deliveryIds[0]
                : undefined;
        }
        if (!deliveryId) {
            console.error("최종 배달완료를 위한 deliveryId가 없습니다.");
            return;
        }

        let $btn = $('<button id="finalDeliveryBtn" class="map-action-btn">최종 배달완료</button>');
        let div = document.createElement("div");
        div.className = "action-overlay";
        div.appendChild($btn[0]);
        let finalOverlay = new kakao.maps.CustomOverlay({
            position: (riderOverlays.length > 0)
                ? riderOverlays[riderOverlays.length - 1].getPosition()
                : map1.getCenter(),
            content: div,
            yAnchor: 1.2,
            xAnchor: 0.5
        });
        finalOverlay.setMap(map1);
        $btn.on('click', function () {
            $btn.prop('disabled', true).addClass('disabled');

    // 방위각 계산
    function calculateBearing(fromLatLng, toLatLng) {
        let lat1 = fromLatLng.getLat() * Math.PI / 180;
        let lon1 = fromLatLng.getLng() * Math.PI / 180;
        let lat2 = toLatLng.getLat() * Math.PI / 180;
        let lon2 = toLatLng.getLng() * Math.PI / 180;
        let y = Math.sin(lon2 - lon1) * Math.cos(lat2);
        let x = Math.cos(lat1) * Math.sin(lat2)
            - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
        let brng = Math.atan2(y, x) * 180 / Math.PI;
        return (brng + 360) % 360;
    }

        routeResult.segments.forEach(function (segment) {
            segment.coords.forEach(function (point) {
                path.push(new kakao.maps.LatLng(point.y, point.x));
            });
        });
        let polyline = new kakao.maps.Polyline({
            path: path,
            strokeWeight: 5,
            strokeColor: polyColor,
            strokeOpacity: 0.8,
            strokeStyle: 'solid'
        });
        polyline.setMap(map1);
        polylines.push(polyline);
    }
    /////////////////////////////////////////////////////////////
    // 거리/시간 계산
    function computeTravelTime(fromLatLng, toLatLng) {
        const from = (typeof fromLatLng.getLat === "function")
            ? {lat: fromLatLng.getLat(), lng: fromLatLng.getLng()}
            : {lat: fromLatLng.lat, lng: fromLatLng.lng};
        const to = (typeof toLatLng.getLat === "function")
            ? {lat: toLatLng.getLat(), lng: toLatLng.getLng()}
            : {lat: toLatLng.lat, lng: toLatLng.lng};
        const distance = haversineDistance(from, to);
        const avgSpeed = 11.11; // m/s (예: 40km/h)
        const timeInSeconds = distance / avgSpeed;
        return Math.ceil(timeInSeconds / 60);
    }
</script>
